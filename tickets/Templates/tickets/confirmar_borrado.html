{% extends 'tickets/base.html' %}
{% block content %}
<div style="max-width: 400px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; text-align: center;">
    <div class="contenedor">
        <h1>¿Eliminar Ticket?</h1>
        <p>¿Estás seguro de que deseas eliminar el ticket: <strong>"{{ object.titulo }}"</strong>?</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" style="background-color: #dc3545; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">Sí, Eliminar</button>
            <a href="{% url 'lista_tickets' %}" class="cancelar">Cancelar</a>
        </form>
    </div>
    </div>
{% endblock %}
