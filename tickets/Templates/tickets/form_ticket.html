<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Ticket</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .contenedor { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; }
        h1 { margin-top: 0; color: #333; }
        form p { margin-bottom: 15px; }
        /* Estilo automático para los inputs que genera Django */
        input[type="text"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        textarea { height: 100px; resize: vertical; }
        .btn { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        .btn:hover { background-color: #218838; }
        .regresar { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Nuevo Ticket</h1>
        
        <form method="post">
            {% csrf_token %} 
            
            {{ form.as_p }}
            
            <button type="submit" class="btn">Guardar Ticket</button>
        </form>

        <a href="{% url 'lista_tickets' %}" class="regresar">Cancelar y volver</a>
    </div>

</body>
</html>
