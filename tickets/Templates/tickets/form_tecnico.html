{% extends 'tickets/base.html' %}

{% block title %}Formulario de Técnico{% endblock %}

{% block content %}
<div style="max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto;">
    
    <h1>{% if object %}Editar Técnico{% else %}Nuevo Técnico{% endif %}</h1>
    
    <form method="post">
        {% csrf_token %}
        
        <style>
            input[type="text"], input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px; }
            .btn-verde { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
            .btn-verde:hover { background-color: #218838; }
        </style>

        {{ form.as_p }}
        
        <button type="submit" class="btn-verde">Guardar Cambios</button>
    </form>

    <a href="{% url 'lista_tecnicos' %}" style="display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none;">Cancelar</a>
</div>
{% endblock %}
